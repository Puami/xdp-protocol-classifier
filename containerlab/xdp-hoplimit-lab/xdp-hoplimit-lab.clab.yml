name: xdp-hoplimit-lab

topology:
  defaults:
    kind: linux
    image: clab-softnet-xdp-hoplimit:latest

  nodes:
    node1:
      binds:
        - configs/node1.cfg:/etc/nodes/node1.cfg:ro
        - /sys/kernel/debug:/sys/kernel/debug:ro
        - src/:/work/bpf:ro
        - bin/entrypoint.sh:/entrypoint.sh:ro
        - bin/sum-percpu.sh:/usr/local/bin/sum-percpu:ro
      exec:
        - bash /entrypoint.sh

    node2:
      binds:
        - configs/node2.cfg:/etc/nodes/node2.cfg:ro
        - /sys/kernel/debug:/sys/kernel/debug:ro
        - src/:/work/bpf:ro
        - bin/entrypoint.sh:/entrypoint.sh:ro
        - bin/sum-percpu.sh:/usr/local/bin/sum-percpu:ro
      exec:
        - bash /entrypoint.sh

  links:
    - endpoints:
        - node1:eth1
        - node2:eth1
